# ---------------------------------------------------------------------------
# jwt-key
# RSA key pair used for inter-service JWT authentication.
# Private key: userservice (signs tokens)
# Public key:  all services that verify tokens
#
# Populate via Terraform bank_of_anthos_jwt_private_key /
# bank_of_anthos_jwt_public_key (stored as set_sensitive, never in plan output).
# Demo keys available at:
#   https://github.com/GoogleCloudPlatform/bank-of-anthos/tree/main/extras/jwt
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.jwtKey.secretName }}
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  jwtRS256.key: {{ .Values.jwtKey.privateKey | quote }}
  jwtRS256.key.pub: {{ .Values.jwtKey.publicKey | quote }}
---
# ---------------------------------------------------------------------------
# accounts-db-credentials
# ---------------------------------------------------------------------------
{{- if .Values.accountsDb.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.accountsDb.credentials.secretName }}
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.accountsDb.credentials.password | quote }}
{{- end }}
---
# ---------------------------------------------------------------------------
# ledger-db-credentials
# ---------------------------------------------------------------------------
{{- if .Values.ledgerDb.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.ledgerDb.credentials.secretName }}
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.ledgerDb.credentials.password | quote }}
  SPRING_DATASOURCE_PASSWORD: {{ .Values.ledgerDb.credentials.password | quote }}
{{- end }}
