{{- if .Values.contacts.enabled }}
# ---------------------------------------------------------------------------
# contacts – User contact list management (Python)
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: contacts
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "boa.selectorLabels" "contacts" | nindent 4 }}
spec:
  replicas: {{ .Values.contacts.replicas }}
  selector:
    matchLabels:
      {{- include "boa.selectorLabels" "contacts" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "boa.selectorLabels" "contacts" | nindent 8 }}
      {{- $annotations := include "boa.podAnnotations" (list $.Values.global.podAnnotations .Values.contacts.podAnnotations) }}
      {{- if $annotations }}
      annotations:
        {{- $annotations | nindent 8 }}
      {{- end }}
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: contacts
          image: {{ include "boa.image" (list . .Values.contacts .Values.contacts.imageName) }}
          imagePullPolicy: {{ include "boa.imagePullPolicy" . }}
          {{- with .Values.contacts.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.contacts.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: environment-config
            - configMapRef:
                name: accounts-db-config
          env:
            - name: PORT
              value: "8080"
            - name: ENABLE_TRACING
              value: "false"
            - name: ENABLE_METRICS
              value: "false"
            {{- with .Values.contacts.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: jwt-key
              mountPath: /tmp/.ssh
              readOnly: true
          resources:
            {{- toYaml .Values.contacts.resources | nindent 12 }}
      volumes:
        {{- include "boa.jwtPublicKeyVolume" . | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: contacts
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    {{- include "boa.selectorLabels" "contacts" | nindent 4 }}
  ports:
    - port: 8080
      targetPort: 8080
{{- end }}
